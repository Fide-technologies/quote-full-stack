# fly.toml app configuration file generated for your Shopify App
# Guide: https://fly.io/docs/reference/configuration/

app = "merchant-quote-app"
primary_region = "lax"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[env]
  NODE_ENV = "production"
  PORT = "3001"
  HOST_SCHEMA = "https"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
